appId: com.conuwalks.app
---
# Select the Development Server
- runFlow:
    when:
      visible: "http://.*"
    commands:
      - tapOn:
          text: "http://.*"
          optional: true
      - extendedWaitUntil:
          notVisible: "Development Build"
          timeout: 3000
    optional: true

- waitForAnimationToEnd:
    timeout: 1000

# Handle Android/iOS Location Popup if it slips past launchApp
# - runFlow:
#     when:
#       visible:
#         text: "Allow.*"
#     commands:
#       - tapOn:
#           text: "Allow.*"
#           optional: true # Don't fail if it disappears

# Handle "Notifications" popup (common on iOS)
- runFlow:
    when:
      visible:
        text: ".*Notification.*"
    commands:
      - tapOn:
          text: "Allow|OK"
          optional: true
    optional: true

# Bypass the Expo dev overlay
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn:
          point: 50%, 10%

# Close the second full Expo dev menu
- runFlow:
    when:
      visible: "Performance monitor"
    commands:
      # Tap the 'x' icon in the top right corner
      - tapOn:
          point: 90%, 6%
          optional: true

# Start the Google Calendar Sign-In process
- runFlow:
    when:
      visible: "GET STARTED WITH GOOGLE CALENDAR"
    commands:
      - tapOn: "GET STARTED WITH GOOGLE CALENDAR"
    optional: true

# Wait for the Google Sign-In bottom sheet/modal to render
- extendedWaitUntil:
    visible: "Choose an account"
    timeout: 3000
    optional: true

# Condition 1: "John Tester" is already an option
- runFlow:
    when:
      visible: "${USERNAME}"
    commands:
      - tapOn: "${USERNAME}"

      # Wait for the webview to load either the Warning screen OR the Consent screen
      - extendedWaitUntil:
          visible: ".*verified this app.*|Conuwalks wants access to your Google Account"
          timeout: 5000

      # Scenario 1: Bypass "Google hasn't verified this app" (Point tap)
      - runFlow:
          when:
            visible: ".*verified this app.*"
          commands:
            - tapOn:
                "Continue"
                # point: 13%, 48%

      - extendedWaitUntil:
          visible: "Conuwalks wants access to your Google Account"
          timeout: 5000
      - scrollUntilVisible:
          element:
            text: "Continue"
          direction: DOWN
      - tapOn: "Continue"
    optional: true
