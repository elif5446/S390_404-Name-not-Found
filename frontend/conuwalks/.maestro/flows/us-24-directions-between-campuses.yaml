appId: com.conuwalks.app
tags:
  - feature
  - navigation
  - cross-campus
---
- runFlow:
    file: ../subflows/launch.yaml
    env:
      USERNAME: "${USERNAME}"
      PASSWORD: "${PASSWORD}"

- setLocation:
    latitude: 45.495633
    longitude: -73.578902
- waitForAnimationToEnd
- runFlow:
    file: ../subflows/clear-next-class-banner.yaml

- tapOn: "Loyola"
- waitForAnimationToEnd

- tapOn:
    point: 15%, 55%

- assertVisible: "Richard J. Renaud Science Complex"
- tapOn:
    id: "directions-button"

- assertVisible: "Directions"
- assertVisible: "Current Location"
- assertVisible: "Richard J. Renaud Science Complex"

- tapOn:
    point: 30%, 70%
- tapOn:
    id: "navigate-button"
- waitForAnimationToEnd

- assertVisible:
    id: "indoor-map-canvas"
    optional: true
- tapOn:
    id: "indoor-back-button"
    optional: true

- assertVisible: "Transit.*"
- assertVisible: ".*ETA"

- assertVisible:
    id: "cancel-navigation-button"
- tapOn:
    id: "cancel-navigation-button"

- runFlow:
    file: ../subflows/close-popup.yaml

- assertNotVisible: "Transit.*"
